services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ippulse-web:latest
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - COSMO_ROUTER_URL=http://cosmo-router:3002/graphql
    depends_on:
      redis:
        condition: service_healthy
      cosmo-router:
        condition: service_started
    # Same probe as the in-image HEALTHCHECK, declared here so `docker
    # compose ps` and `--wait` see the readiness signal too. Distroless has
    # no shell or curl, hence the inline node fetch.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: ippulse-worker:latest
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # Federated subgraphs — five GraphQL services whose schemas are published
  # to Cosmo Cloud via `cosmo/setup.sh`. The Cosmo Router fetches the
  # composed schema from Cosmo Cloud and routes incoming queries to these
  # services by name (host=`subgraphs`, port=4001..4005).
  subgraphs:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ippulse-web:latest
    command: ["node", "--conditions=react-server", "--import", "tsx", "subgraphs/index.ts"]
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "4001-4005:4001-4005"

  # WunderGraph Cosmo Router — the unified GraphQL endpoint for the whole
  # IP-Pulse data layer. Set GRAPH_API_TOKEN to the token you created via
  # `wgc router token create local --graph-name ip-pulse --namespace development`.
  cosmo-router:
    image: ghcr.io/wundergraph/cosmo/router:latest
    pull_policy: always
    ports:
      - "3002:3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEV_MODE=true
      - LISTEN_ADDR=0.0.0.0:3002
      - GRAPH_API_TOKEN=${COSMO_GRAPH_API_TOKEN:-}
    depends_on:
      - subgraphs

  redis:
    image: cgr.dev/chainguard/redis:latest
    ports:
      - "6379:6379"
    # Image ENTRYPOINT is already redis-server; only pass redis args (not "redis-server" again).
    command: ["--appendonly", "yes"]
    volumes:
      - redis-data:/data
    # Chainguard's redis image ships `redis-cli` alongside the server.
    # Exec form (no shell needed in distroless).
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

volumes:
  redis-data:
