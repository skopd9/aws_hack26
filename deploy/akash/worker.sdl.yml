---
# IP-Pulse worker — single-service variant. Use this when you only want
# the background worker on Akash and the web app is hosted elsewhere
# (Vercel, Fly, etc.). For the full stack on Akash, use `stack.sdl.yml`.

version: "2.0"

services:
  worker:
    image: cgr.dev/CHAINGUARD_ORG/ippulse-worker:latest
    env:
      - NODE_ENV=production
      # External Redis URL (e.g. Upstash). Set in the Akash Console
      # "Update Configuration" step.
      - REDIS_URL
      - ANTHROPIC_API_KEY
      - COSMO_ROUTER_URL
      - MOCK_FALLBACK=true
    # No `expose:` — worker is outbound-only.

profiles:
  compute:
    worker-compute:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          - size: 1Gi

  placement:
    akash-dc:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
      pricing:
        worker-compute:
          denom: uakt
          amount: 1000

deployment:
  worker:
    akash-dc:
      profile: worker-compute
      count: 1
